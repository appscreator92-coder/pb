name: Generate Plusbox Playlist

on:
  schedule:
    # Runs every 6 hours to refresh tokens (GMT/UTC time)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi requests

      - name: Run Playlist Generator
        run: python pb.py

      - name: Commit and Push Playlist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add playlist.m3u
          # Only commit if the file actually changed to avoid errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update playlist - $(date -u +'%Y-%m-%d %H:%M:%S') GMT" && git push)
