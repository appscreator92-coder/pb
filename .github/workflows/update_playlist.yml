name: Auto Scrape Plusbox

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to push changes back to repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requirements
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python pb.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # Force check for the file
          if [ -f playlist.m3u ]; then
            git add playlist.m3u
            # Only commit if there are changes
            if ! git diff --cached --quiet; then
              git commit -m "Update playlist: $(date)"
              git push
            else
              echo "No changes detected in playlist."
            fi
          else
            echo "File playlist.m3u was not found. Scraper might have failed."
            exit 1
          fi
